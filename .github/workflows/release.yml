name: Release

# Publishes to PyPI when a v* tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. Configure it once at
# https://pypi.org/manage/project/imagespec/settings/publishing/ with:
#   owner = eigger, repo = imagespec, workflow = release.yml, environment = pypi
# If you'd rather use a token, delete the `permissions`/`environment` blocks and
# add `with: { password: ${{ secrets.PYPI_API_TOKEN }} }` to the publish step.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
