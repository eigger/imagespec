name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with optional extras)
        run: pip install -e ".[dev,datamatrix]"
      - name: Run tests
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - name: Verify bundled assets are in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          required = [
              "imagespec/fonts/NotoSansKR-Regular.ttf",
              "imagespec/fonts/ppb.ttf",
              "imagespec/icons/materialdesignicons-webfont.ttf",
              "imagespec/icons/materialdesignicons-webfont_meta.json",
          ]
          missing = [r for r in required if r not in names]
          if missing:
              print("MISSING from wheel:", missing); sys.exit(1)
          print("All bundled assets present in", wheel)
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
